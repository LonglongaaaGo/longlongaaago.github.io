    <rect class="gold" x="24" y="164" width="86" height="24" rx="6"/>
    <text class="sans tag" x="41" y="181">NeurIPS</text>
    <rect class="blue" x="120" y="164" width="58" height="24" rx="6"/>
    <text class="sans tag" x="137" y="181">PEFT</text>
    <rect class="green" x="188" y="164" width="118" height="24" rx="6"/>
    <text class="sans tag" x="206" y="181">Neurocomputing</text>
  </g>

