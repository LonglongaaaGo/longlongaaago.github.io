    <text class="mono tiny muted" x="16" y="25">flagship</text>
    <text class="sans h2 gold" x="16" y="54">2</text>
  </g>

  <g transform="translate(488 246)">
    <rect class="panel-soft" width="424" height="198" rx="14"/>
    <rect x="24" y="22" width="376" height="54" rx="10" fill="#20221f"/>
    <text class="mono tiny" x="48" y="55" fill="#f7c870">Wanglong Lu / research core</text>
