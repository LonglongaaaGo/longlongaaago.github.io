    <text class="sans small muted" x="24" y="143">human-centered sensing and autonomy</text>
    <rect class="purple" x="24" y="164" width="62" height="24" rx="6"/>
    <text class="sans tag" x="42" y="181">ECCV</text>
    <rect class="blue" x="96" y="164" width="54" height="24" rx="6"/>
    <text class="sans tag" x="112" y="181">ETRA</text>
    <rect class="green" x="160" y="164" width="76" height="24" rx="6"/>
    <text class="sans tag" x="178" y="181">medical</text>
  </g>

  <g transform="translate(486 586)">
    <rect class="panel" width="428" height="126" rx="12"/>
    <rect class="purple-soft" x="24" y="22" width="60" height="60" rx="10"/>
