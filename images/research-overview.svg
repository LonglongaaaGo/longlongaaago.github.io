<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Research overview map</title>
  <desc id="desc">A structured overview of Wanglong Lu's 28-publication research portfolio across generative vision, restoration, efficient adaptation, assistive vision, and applied ML systems.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8f3; }
      .grid { stroke: #d9ded5; stroke-width: 1; opacity: 0.55; }
      .panel { fill: #ffffff; stroke: #d9ded5; stroke-width: 2; }
      .panel-soft { fill: #fbfcf8; stroke: #c9d1c7; stroke-width: 2; }
      .ink { fill: #20221f; }
      .muted { fill: #626a64; }
      .blue { fill: #2c638f; }
      .green { fill: #55766a; }
      .gold { fill: #a8752a; }
      .red { fill: #a15045; }
      .purple { fill: #6d5f88; }
      .blue-soft { fill: #e6eef4; }
      .green-soft { fill: #e8eee7; }
      .gold-soft { fill: #f4ecdc; }
      .red-soft { fill: #f2e8e6; }
      .purple-soft { fill: #ece9f3; }
      .line { fill: none; stroke: #7e8981; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .line-strong { fill: none; stroke: #2c638f; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; letter-spacing: 0; }
      .mono { font-family: SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace; letter-spacing: 0; }
      .h1 { font-size: 40px; font-weight: 850; }
      .h2 { font-size: 24px; font-weight: 820; }
      .body { font-size: 18px; font-weight: 520; }
      .small { font-size: 15px; font-weight: 640; }
      .tiny { font-size: 13px; font-weight: 760; }
      .tag { fill: #ffffff; font-size: 13px; font-weight: 780; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 5 L0 10 z" fill="#7e8981"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 5 L0 10 z" fill="#2c638f"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="900"/>
  <g opacity="0.5">
    <path class="grid" d="M80 148 H1320"/>
    <path class="grid" d="M80 330 H1320"/>
    <path class="grid" d="M80 512 H1320"/>
    <path class="grid" d="M80 694 H1320"/>
    <path class="grid" d="M250 86 V820"/>
    <path class="grid" d="M700 86 V820"/>
    <path class="grid" d="M1150 86 V820"/>
  </g>

  <text class="mono tiny green" x="76" y="58">// research overview</text>
  <text class="sans h1 ink" x="76" y="106">Research Portfolio Map</text>
  <text class="sans body muted" x="78" y="138">Generative vision, restoration, efficient adaptation, assistive vision, and production ML.</text>

  <g transform="translate(850 48)">
    <rect class="panel-soft" width="118" height="66" rx="10"/>
    <text class="mono tiny muted" x="16" y="25">publications</text>
    <text class="sans h2 blue" x="16" y="54">28</text>
  </g>
  <g transform="translate(982 48)">
    <rect class="panel-soft" width="118" height="66" rx="10"/>
    <text class="mono tiny muted" x="16" y="25">lead author</text>
    <text class="sans h2 green" x="16" y="54">8</text>
  </g>
  <g transform="translate(1114 48)">
