    <rect class="red-soft" x="22" y="22" width="64" height="64" rx="10"/>
    <path d="M38 76 C38 50 50 38 56 38 C62 38 74 50 74 76" fill="none" stroke="#a15045" stroke-width="8" stroke-linecap="round"/>
