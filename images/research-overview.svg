    <rect class="red" x="24" y="164" width="78" height="24" rx="6"/>
    <text class="sans tag" x="42" y="181">TCSVT</text>
    <rect class="green" x="112" y="164" width="98" height="24" rx="6"/>
    <text class="sans tag" x="128" y="181">Info Fusion</text>
    <rect class="blue" x="220" y="164" width="54" height="24" rx="6"/>
    <text class="sans tag" x="236" y="181">PR</text>
  </g>

  <g transform="translate(948 178)">
    <rect class="panel" width="376" height="204" rx="12"/>
    <rect class="gold-soft" x="22" y="22" width="64" height="64" rx="10"/>
    <path d="M36 72 L36 48 L54 36 L72 48 L72 72 L54 84 Z" fill="#a8752a"/>
    <path d="M45 58 H63 M54 47 V74" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
