  <path class="line" d="M488 388 C410 410 374 456 332 514" marker-end="url(#arrow)"/>
  <path class="line" d="M912 300 C982 286 1026 252 1068 210" marker-end="url(#arrow)"/>
  <path class="line" d="M912 388 C990 410 1026 456 1068 514" marker-end="url(#arrow)"/>

  <g transform="translate(76 178)">
    <rect class="panel" width="376" height="204" rx="12"/>
    <rect class="blue-soft" x="22" y="22" width="64" height="64" rx="10"/>
    <path d="M37 68 L54 39 L71 68 Z" fill="#2c638f"/>
    <path d="M34 77 H74" stroke="#2c638f" stroke-width="5" stroke-linecap="round"/>
