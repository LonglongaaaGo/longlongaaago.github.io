    <circle cx="120" cy="58" r="7" fill="#55766a"/>
    <circle cx="300" cy="58" r="7" fill="#55766a"/>
    <circle cx="455" cy="58" r="7" fill="#a8752a"/>
    <circle cx="705" cy="58" r="7" fill="#2c638f"/>
    <circle cx="1005" cy="58" r="7" fill="#a15045"/>
  </g>
</svg>
